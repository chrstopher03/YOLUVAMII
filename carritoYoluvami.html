<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrito | YOLUVAMI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --primary:#1e3a8a;
  --primary-light:#3b82f6;
  --bg:#f3f4f6;
  --text:#111827;
  --danger:#dc2626;
}
body{margin:0;font-family:'Poppins',sans-serif;background:var(--bg);padding-bottom:120px;}
header{background:#fff;padding:18px;text-align:center;font-weight:700;font-size:18px;box-shadow:0 4px 20px rgba(0,0,0,.06);}
.container{padding:20px;max-width:600px;margin:auto;}
.cart-item{background:#fff;border-radius:20px;padding:15px;display:flex;gap:15px;align-items:center;margin-bottom:18px;box-shadow:0 6px 18px rgba(0,0,0,.06);}
.cart-item img{width:90px;height:90px;object-fit:contain;border-radius:15px;background:#fff;}
.item-info{flex:1;}
.item-info h4{margin:0;font-size:15px;font-weight:600;}
.item-info p{margin:8px 0 0;font-weight:700;color:var(--primary);}
.remove-btn{background:var(--danger);color:#fff;border:none;border-radius:10px;padding:8px 12px;cursor:pointer;font-size:12px;}
.total{background:#fff;padding:18px;border-radius:20px;font-weight:700;font-size:18px;box-shadow:0 6px 18px rgba(0,0,0,.06);margin-top:25px;text-align:center;}
.actions{margin-top:25px;display:flex;flex-direction:column;gap:12px;}
.btn{padding:14px;border:none;border-radius:15px;font-weight:600;cursor:pointer;font-size:14px;}
.pagar{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;}
.factura{background:#10b981;color:#fff;}
.vaciar{background:#e5e7eb;}
.regresar{background:#111827;color:#fff;}
.empty{text-align:center;padding:40px 0;color:#6b7280;}
</style>
</head>
<body>

<header>Carrito YOLUVAMI</header>

<div class="container">
<div id="cartItems"></div>
<div id="cartTotal" class="total"></div>

<div class="actions">
  <button id="btnPagar" class="btn pagar">Proceder al pedido</button>
  <button id="btnFactura" class="btn factura">Descargar Factura</button>
  <button id="btnVaciar" class="btn vaciar">Vaciar carrito</button>
  <button id="btnRegresar" class="btn regresar">Regresar</button>
</div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
const cartItems = document.getElementById("cartItems");
const cartTotal = document.getElementById("cartTotal");
const numeroWhatsApp = "50583320030";

function renderCart(){
  cartItems.innerHTML="";
  let total=0;
  if(cart.length===0){
    cartItems.innerHTML=`<div class="empty">Tu carrito está vacío 🛍️</div>`;
    cartTotal.innerHTML="";
    return;
  }
  cart.forEach((item,index)=>{
    const cantidad = item.cantidad || 1;
    total += item.price * cantidad;
    cartItems.innerHTML += `
      <div class="cart-item">
        <img src="${item.img}">
        <div class="item-info">
          <h4>${item.name}</h4>
          <p>C$${item.price} x ${cantidad}</p>
        </div>
        <button class="remove-btn" onclick="removeItem(${index})">Eliminar</button>
      </div>
    `;
  });
  cartTotal.innerHTML = "Total a pagar: C$" + total;
}

function removeItem(index){
  cart.splice(index,1);
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

function vaciarCarrito(){
  cart=[];
  localStorage.removeItem("cart");
  renderCart();
}

function volver(){ window.location.href="yoluvami.html"; }

// Proceder al pedido por WhatsApp
function procederPedido(){
  if(cart.length===0){ alert("Tu carrito está vacío 🛒"); return; }
  let total=0;
  let mensaje="🛒 *Nuevo Pedido YOLUVAMI* %0A%0A";
  cart.forEach(p=>{
    const cantidad = p.cantidad || 1;
    const subtotal = p.price*cantidad;
    mensaje+=`• ${p.name} x${cantidad} - C$${subtotal}%0A`;
    total += subtotal;
  });
  mensaje+=`%0A💰 *Total: C$${total}*`;
  window.open(`https://wa.me/${numeroWhatsApp}?text=${mensaje}`,"_blank");
}

// Descargar Factura PDF tipo ticket centrada
async function descargarFactura(){
  if(cart.length===0){ alert("Tu carrito está vacío 🛒"); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:[300,400]});
  let y=20;
  let total=0;
  const fecha = new Date();
  const numeroFactura = "FAC-"+Math.floor(Math.random()*1000000);

  // Logo centrado
  try{
    const imgData = await new Promise((res,rej)=>{
      const img = new Image();
      img.crossOrigin="anonymous";
      img.src="23.jpeg"; // Logo en la misma carpeta
      img.onload = ()=>{ 
        const c = document.createElement("canvas");
        c.width=img.width; c.height=img.height;
        c.getContext("2d").drawImage(img,0,0);
        res(c.toDataURL("image/jpeg"));
      };
      img.onerror = rej;
    });
    doc.addImage(imgData,'JPEG',125,y,50,25); // Centrado en ticket 300pt ancho
  }catch(e){ console.log("Logo no cargó"); }
  y+=40;

  // Títulos centrados
  doc.setFontSize(12);
  doc.text("YOLUVAMI AUTOPARTES",150,y,{align:"center"}); y+=14;
  doc.setFontSize(10);
  doc.text("Factura de Venta",150,y,{align:"center"}); y+=12;
  doc.text(`Factura: ${numeroFactura}`,150,y,{align:"center"}); y+=12;
  doc.text(`Fecha: ${fecha.toLocaleDateString()}`,150,y,{align:"center"}); y+=12;
  doc.text(`Hora: ${fecha.toLocaleTimeString()}`,150,y,{align:"center"}); y+=10;

  doc.text("---------------------------",150,y,{align:"center"}); y+=12;
  doc.text("Producto   Cant  Total",150,y,{align:"center"}); y+=12;
  doc.text("---------------------------",150,y,{align:"center"}); y+=12;

  // Productos alineados tipo ticket
  cart.forEach(item=>{
    const cantidad = item.cantidad || 1;
    const subtotal = item.price*cantidad;
    let nombre = item.name.length>15 ? item.name.substring(0,15) : item.name;
    const linea = nombre.padEnd(15," ") + String(cantidad).padStart(3," ") + "   C$"+subtotal;
    doc.text(linea,150,y,{align:"center"});
    total+=subtotal;
    y+=12;
  });

  doc.text("---------------------------",150,y,{align:"center"}); y+=12;
  doc.setFontSize(12);
  doc.text(`TOTAL: C$${total}`,150,y,{align:"center"}); y+=14;
  doc.setFontSize(10);
  doc.text("Gracias por su compra",150,y,{align:"center"}); y+=12;
  doc.text("YOLUVAMI",150,y,{align:"center"});

  doc.save(`Factura_YOLUVAMI_${numeroFactura}.pdf`);
}

// Botones
document.getElementById("btnPagar").addEventListener("click",procederPedido);
document.getElementById("btnFactura").addEventListener("click",descargarFactura);
document.getElementById("btnVaciar").addEventListener("click",vaciarCarrito);
document.getElementById("btnRegresar").addEventListener("click",volver);

renderCart();
</script>

</body>
</html>
