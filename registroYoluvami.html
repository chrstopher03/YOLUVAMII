function alerta(msg,color="#2563eb"){const div=document.createElement("div");div.innerText=msg;div.style.position="fixed";div.style.bottom="20px";div.style.right="20px";div.style.background=color;div.style.color="white";div.style.padding="12px 18px";div.style.borderRadius="12px";div.style.fontWeight="600";div.style.boxShadow="0 6px 16px rgba(0,0,0,0.3)";div.style.zIndex="9999";div.style.fontFamily="Poppins";document.body.appendChild(div);setTimeout(()=>{div.remove()},3000)}

function mostrarRecuperar(){
document.getElementById("recuperarBox").style.display="block";
}

function cambiarClave(){

const user = document.getElementById("usuarioRecuperar").value.toLowerCase();
const nueva = document.getElementById("nuevaClave").value;

let encontrado = usuariosSistema.find(u=>u.user===user);

if(!encontrado){
alerta("Usuario no encontrado","#dc2626");
return;
}

encontrado.pass = nueva;

localStorage.setItem("usuariosYoluvami",JSON.stringify(usuariosSistema));

alerta("Contraseña actualizada","#16a34a");

document.getElementById("recuperarBox").style.display="none";
}
function login(){const user=document.getElementById("usuario").value.toLowerCase();const pass=document.getElementById("clave").value;const encontrado=usuariosSistema.find(u=>u.user===user && u.pass===pass);if(encontrado){usuarioActual=encontrado;localStorage.setItem("usuarioActivo",JSON.stringify(encontrado));document.getElementById("loginScreen").style.display="none";document.getElementById("usuarioActivo").innerText=encontrado.user;mostrarHistorial();cargarProductosStock()} else{document.getElementById("errorLogin").innerText="Usuario o contraseña incorrecta"}}
function logout(){localStorage.removeItem("usuarioActivo");location.reload()}

function abrirCajaEfectivo(total, callback){

    const modal = document.createElement("div");

    modal.style.cssText = `
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.7);
        display:flex;
        justify-content:center;
        align-items:center;
        z-index:9999;
    `;

    modal.innerHTML = `
        <div style="background:#111;color:white;padding:25px;border-radius:15px;width:300px;text-align:center;">
            
            <h2>Total: C$${total.toFixed(2)}</h2>

            <input type="number" id="montoRecibido" placeholder="Ingrese monto"
            style="width:100%;padding:10px;margin:15px 0;border-radius:8px;border:none;font-size:18px;">

            <p id="cambioTexto">Cambio: C$0.00</p>

            <button id="btnConfirmar" style="margin:5px;padding:10px;border:none;border-radius:8px;background:#16a34a;color:white;">
                Confirmar
            </button>

            <button id="btnCancelar" style="margin:5px;padding:10px;border:none;border-radius:8px;background:#dc2626;color:white;">
                Cancelar
            </button>

        </div>
    `;

    document.body.appendChild(modal);

    const input = modal.querySelector("#montoRecibido");
    const cambioTexto = modal.querySelector("#cambioTexto");

    input.focus(); // 🔥 automático

    // 🔥 CAMBIO EN TIEMPO REAL
    input.addEventListener("input", () => {
        const recibido = parseFloat(input.value);

        if(isNaN(recibido)){
            cambioTexto.innerText = "Cambio: C$0.00";
            return;
        }

        let cambio = recibido - total;

        if(cambio < 0){
            cambioTexto.innerText = "Faltan: C$" + Math.abs(cambio).toFixed(2);
        } else {
            cambioTexto.innerText = "Cambio: C$" + cambio.toFixed(2);
        }
    });

    // ✅ CONFIRMAR
    modal.querySelector("#btnConfirmar").onclick = () => {
        const recibido = parseFloat(input.value);

        if(isNaN(recibido) || recibido < total){
            alerta("Monto insuficiente","#dc2626");
            return;
        }

        let cambio = recibido - total;

        callback(recibido, cambio);

        modal.remove();
    };

    // ❌ CANCELAR
    modal.querySelector("#btnCancelar").onclick = () => {
        modal.remove();
    };
}

function finalizarVenta(){

    if(ventaActual.length === 0){
        alerta("No hay productos","#dc2626");
        return;
    }

    const fecha = new Date();
    const total = ventaActual.reduce((acc,p)=>acc + (p.subtotal || 0), 0);

    const tipoPago = document.getElementById("tipoPago").value;

    let detallePago = "";

    if(tipoPago === "efectivo"){

    abrirCajaEfectivo(total, (recibido, cambio) => {

        let detallePago = `Efectivo - Recibido: ${recibido} Cambio: ${cambio}`;

        // 🔥 GUARDAR VENTA AQUÍ (porque es async)
        historial.push({
            fecha: fecha.toLocaleDateString(),
            hora: fecha.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
            vendedor: usuarioActual?.user || "Desconocido",
            productos: JSON.parse(JSON.stringify(ventaActual)),
            total,
            tipoPago,
            detallePago
        });

        localStorage.setItem("ventasYoluvami", JSON.stringify(historial));

        alerta("Venta realizada ✅","#16a34a");

        ventaActual = [];
        actualizarTabla();
        mostrarHistorial();
    });

    return; // 🔴 IMPORTANTE: detener flujo normal
}
    // 🏦 TRANSFERENCIA
    else if(tipoPago === "transferencia"){
        detallePago = "Transferencia";
    }

    // 🔀 MIXTO
    else if(tipoPago === "mixto"){
        let efectivo = parseFloat(prompt("Efectivo:"));
        let transferencia = parseFloat(prompt("Transferencia:"));

        if(isNaN(efectivo) || isNaN(transferencia) || (efectivo + transferencia) < total){
            alerta("Monto incompleto","#dc2626");
            return;
        }

        detallePago = `Mixto - Efectivo:${efectivo} Transferencia:${transferencia}`;
    }

    // ==================== FIADO ====================
    if(tipoPago === "fiado"){

        pedirDatosFiado((nombreCliente, fechaPago)=>{

            deudas.push({
                cliente: nombreCliente,
                total: total,
                fecha: fecha.toLocaleDateString(),
                fechaPago: fechaPago,
                productos: JSON.parse(JSON.stringify(ventaActual))
            });

            localStorage.setItem("deudasYoluvami", JSON.stringify(deudas));

            alerta("Venta FIADA guardada 📅","#f59e0b");

            ventaActual = [];
            actualizarTabla();
            mostrarDeudas();
        });

        return; // 🔴 IMPORTANTE: evita que también guarde en historial
    }

    // ==================== GUARDAR VENTA NORMAL ====================
    historial.push({
        fecha: fecha.toLocaleDateString(),
        hora: fecha.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
        vendedor: usuarioActual?.user || "Desconocido",
        productos: JSON.parse(JSON.stringify(ventaActual)),
        total,
        tipoPago,
        detallePago
    });

    localStorage.setItem("ventasYoluvami", JSON.stringify(historial));

    alerta("Venta realizada ✅","#16a34a");

    ventaActual = [];
    actualizarTabla();
    mostrarHistorial();
}function iniciarScanner(){

    const reader = new Html5Qrcode("reader");

    reader.start(
        { facingMode: "environment" },
{ fps: 20, qrbox: { width: 280, height: 280 } },
        (codigo) => {

let id = codigo.trim().toUpperCase();
            // 🔥 SI ES URL → extraer ID
            if(codigo.includes("id=")){
                try{
                    let partes = codigo.split("id=");
                    id = partes[1].split("&")[0];
                }catch(e){
                    console.error("Error leyendo QR:", e);
                }
            }

            // 🔥 LIMPIAR ESPACIOS (por si acaso)
            id = id.trim();

            // 🔍 BUSCAR PRODUCTO
let producto = productos.find(p => p.id.toUpperCase() === id);
console.log("QR leído:", codigo);
console.log("ID procesado:", id);
            if(producto){

                if(producto.stock <= 0){
                    alerta("❌ Sin stock","#dc2626");
                    reader.stop();
                    return;
                }

                // 🔁 SI YA EXISTE EN LA VENTA
                let existente = ventaActual.find(v => v.name === producto.name);

                if(existente){
                    existente.cantidad++;
                    existente.subtotal += producto.price;
                }else{
                    ventaActual.push({
                        name: producto.name,
                        price: producto.price,
                        img: producto.img,
                        cantidad: 1,
                        subtotal: producto.price
                    });
                }

                producto.stock--;
                guardarStock();

                actualizarTabla();

                alerta("Producto agregado 🛒","#16a34a");

            }else{
                alerta("Producto no encontrado","#dc2626");
            }

            reader.stop(); // 🛑 evita múltiples lecturas
        },

        (error) => {
            // silencioso para no saturar consola
        }
    );
}

        let mes = v.fecha.split("/")[1];
        meses[mes] = (meses[mes] || 0) + v.total;
    });

    graficaActual = new Chart(ctx, {
        type: "bar",
        data: {
            labels: Object.keys(meses),
            datasets: [{
                label: "Ingresos por Mes",
                data: Object.values(meses),
                backgroundColor: "#3b82f6"
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } }
        }
    });
}

}function filtrarPorFecha(){
    const fechaSeleccionada = document.getElementById("filtroFecha").value;

    if(!fechaSeleccionada){
        alerta("Selecciona una fecha","#dc2626");
        return;
    }

    let filtrado = historial.filter(v => {

        // 🟢 SI YA ESTÁ EN FORMATO CORRECTO
        if(v.fecha.includes("-")){
            return v.fecha === fechaSeleccionada;
        }

        // 🔴 SI ESTÁ EN FORMATO 25/3/2026
        if(v.fecha.includes("/")){
            let partes = v.fecha.split("/");

            let dia = partes[0].padStart(2,"0");
            let mes = partes[1].padStart(2,"0");
            let año = partes[2];

            let fechaConvertida = `${año}-${mes}-${dia}`;

            return fechaConvertida === fechaSeleccionada;
        }

        return false;
    });

    if(filtrado.length === 0){
        alerta("No hay ventas en esa fecha","#f59e0b");
    }

    mostrarHistorialFiltrado(filtrado);
}
/* ==================== CONVERTIR IMAGEN A BASE64 ==================== */
function cargarImagenBase64(url) {
    return new Promise((resolve, reject) => {
        let img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = function () {
            let canvas = document.createElement("canvas");
            canvas.width = this.width;
            canvas.height = this.height;
            let ctx = canvas.getContext("2d");
            ctx.drawImage(this, 0, 0);
            resolve(canvas.toDataURL("image/jpeg"));
        };
        img.onerror = reject;
        img.src = url;
    });
}

/* ==================== CORTE DE CAJA ESTILIZADO ==================== */
function corteCaja() {
    if (historial.length === 0) {
        alerta("No hay ventas registradas", "#dc2626");
        return;
    }

    // Crear contenido del corte
    let vendedores = {};
    historial.forEach(v => {
        let nombre = v.vendedor || "Desconocido";
        if (!vendedores[nombre]) {
            vendedores[nombre] = { ventas: 0, total: 0 };
        }
        vendedores[nombre].ventas += 1;
        vendedores[nombre].total += v.total;
    });

    let totalGeneral = 0;
    let contenidoHTML = `<h2 style="text-align:center;color:#1e40af;font-family:Poppins;">📊 CORTE DE CAJA</h2><hr style="border-color:#3b82f6;">`;

    for (let v in vendedores) {
        contenidoHTML += `
        <div style="margin-bottom:10px;padding:5px;border-bottom:1px solid #e5e7eb;">
            <strong style="color:#2563eb;">🧑 ${v}</strong><br>
            Ventas: ${vendedores[v].ventas}<br>
            Total: <strong style="color:#16a34a;">C$${vendedores[v].total}</strong>
        </div>`;
        totalGeneral += vendedores[v].total;
    }

    contenidoHTML += `<hr style="border-color:#3b82f6;">
    <h3 style="text-align:right;color:#dc2626;font-family:Poppins;">💰 TOTAL GENERAL: C$${totalGeneral}</h3>
    <div style="text-align:center;margin-top:10px;"><button id="cerrarCorte" style="padding:6px 12px;background:#3b82f6;color:white;border:none;border-radius:6px;font-weight:600;cursor:pointer;">Cerrar</button></div>`;

    // Crear modal
    const modal = document.createElement("div");
    modal.id = "modalCorteCaja";
    modal.style.position = "fixed";
    modal.style.top = "0";
    modal.style.left = "0";
    modal.style.width = "100%";
    modal.style.height = "100%";
    modal.style.background = "rgba(0,0,0,0.6)";
    modal.style.display = "flex";
    modal.style.alignItems = "center";
    modal.style.justifyContent = "center";
    modal.style.zIndex = "9999";

    modal.innerHTML = `
        <div style="background:white;padding:20px 30px;border-radius:12px;max-width:400px;width:90%;box-shadow:0 10px 25px rgba(0,0,0,0.3);">
            ${contenidoHTML}
        </div>
    `;

    document.body.appendChild(modal);

    // Cerrar modal al presionar el botón
    document.getElementById("cerrarCorte").addEventListener("click", () => {
        modal.remove();
    });
}
