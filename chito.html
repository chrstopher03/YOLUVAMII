let productos = JSON.parse(localStorage.getItem("stockYoluvami")) || productosBase
let ventaActual=[]
let historial=JSON.parse(localStorage.getItem("ventasYoluvami")) || []

const select=document.getElementById("productoSelect")
const buscador=document.getElementById("buscador")
const imgPreview=document.getElementById("imgPreview")

/* GUARDAR STOCK */
function guardarStock(){localStorage.setItem("stockYoluvami",JSON.stringify(productos));mostrarAgotados();cargarProductosStock()}

/* CARGAR PRODUCTOS */
function cargarProductos(lista){
if(!select)return;select.innerHTML=""
lista.forEach(p=>{select.innerHTML+=`<option value="${productos.indexOf(p)}">${p.name} - C$${p.price} (Stock: ${p.stock})</option>`})
mostrarImagen();mostrarAgotados()
}
function mostrarImagen(){if(productos[select.value]&&imgPreview){imgPreview.src=productos[select.value].img}}
if(select){select.addEventListener("change",mostrarImagen)}
if(buscador){buscador.addEventListener("input",()=>{const texto=buscador.value.toLowerCase();cargarProductos(productos.filter(p=>p.name.toLowerCase().includes(texto)))})}

/* AGREGAR VENTA */
function agregarVenta(){
const index=parseInt(select.value)
const cantidad=parseInt(document.getElementById("cantidad").value)
if(!cantidad || cantidad<=0){alerta("Cantidad inválida","#dc2626");return}
const producto=productos[index]
if(producto.stock===0){alerta("❌ Producto agotado","#dc2626");return}
if(producto.stock<cantidad){alerta("⚠️ Stock insuficiente. Solo quedan "+producto.stock,"#f59e0b");return}
producto.stock-=cantidad
guardarStock()
const subtotal=producto.price*cantidad
ventaActual.push({name:producto.name,price:producto.price,img:producto.img,cantidad:cantidad,subtotal:subtotal})
if(producto.stock===0){alerta("⚠️ "+producto.name+" se ha agotado","#dc2626")}
actualizarTabla()
document.getElementById("cantidad").value=""
cargarProductos(productos)
}

/* TABLA VENTA */
function actualizarTabla(){let total=0;const tbody=document.getElementById("tablaVenta");if(!tbody)return;tbody.innerHTML="";ventaActual.forEach((p,i)=>{total+=p.subtotal;tbody.innerHTML+=`<tr><td class="product-row"><img src="${p.img}">${p.name}</td><td>${p.cantidad}</td><td>C$${p.subtotal}</td><td><button class="deleteBtn" onclick="eliminar(${i})">X</button></td></tr>`});const totalVenta=document.getElementById("totalVenta");if(totalVenta) totalVenta.innerText=total}

/* ELIMINAR PRODUCTO */
function eliminar(i){ventaActual.splice(i,1);actualizarTabla()}
/* ==================== FINALIZAR VENTA ==================== */
function finalizarVenta(){

if(ventaActual.length===0){
alerta("No hay productos","#dc2626");
return
}

const fecha=new Date()
const total=ventaActual.reduce((acc,p)=>acc+p.subtotal,0)

const tipoPago = document.getElementById("tipoPago").value;

const venta = {
fecha:fecha.toLocaleDateString(),
hora:fecha.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
vendedor: usuarioActual.user,
productos: JSON.parse(JSON.stringify(ventaActual)),
total,
tipoPago
}

// ==================== FIADO ====================
if(tipoPago === "fiado"){

    pedirDatosFiado((nombreCliente, fechaPago)=>{

        deudas.push({
            cliente: nombreCliente,
            total: total,
            fecha: venta.fecha,
            fechaPago: fechaPago,
            productos: JSON.parse(JSON.stringify(ventaActual))
        });

        localStorage.setItem("deudasYoluvami", JSON.stringify(deudas));

        alerta("Venta FIADA guardada 📅","#f59e0b")

        ventaActual=[]
        actualizarTabla()
        mostrarDeudas()

    })

}else{

    historial.push(venta)

    localStorage.setItem("ventasYoluvami",JSON.stringify(historial))

    alerta("Venta realizada ✅","#16a34a")

    ventaActual=[]
    actualizarTabla()
    mostrarHistorial()
}
}

const modal=document.createElement("div");

modal.style.cssText=`

top:0;left:0;

/* ==================== PAGAR DEUDA ==================== */
function pagarDeuda(index){
mostrarConfirmacion("¿Marcar como cancelado?",()=>{

    let deuda = deudas[index];

    historial.push({
        fecha: deuda.fecha,
        hora: "Pago",
        vendedor: usuarioActual.user,
        productos: deuda.productos || [],
        total: deuda.total,
        tipoPago: "contado"
    });

    deudas.splice(index,1);

    localStorage.setItem("deudasYoluvami",JSON.stringify(deudas));
    localStorage.setItem("ventasYoluvami",JSON.stringify(historial));

    mostrarDeudas();
    mostrarHistorial();

    alerta("Deuda cancelada ✅","#16a34a");
})
}
/* HISTORIAL */

/* PRODUCTOS AGOTADOS */

/* ==================== AGREGAR STOCK ==================== */
function cargarProductosStock() {
    const selectStock = document.getElementById("productoStock");
    if (!selectStock) return;
    selectStock.innerHTML = "";
    productos.forEach((p, i) => {
        selectStock.innerHTML += `<option value="${i}">${p.name} - Stock: ${p.stock}</option>`;
    });
}
cargarProductosStock();

function agregarStock() {
    const index = parseInt(document.getElementById("productoStock").value);
    const cantidad = parseInt(document.getElementById("cantidadStock").value);
    if (!cantidad || cantidad <= 0) {
        alerta("Cantidad inválida", "#dc2626");
        return;
    }
    productos[index].stock += cantidad;
    guardarStock();
    document.getElementById("cantidadStock").value = "";
    alerta("Stock actualizado", "#16a34a");
}
function borrarRegistro(index) {
    mostrarConfirmacion("¿Eliminar este registro?", () => {
        historial.splice(index, 1);
        localStorage.setItem("ventasYoluvami", JSON.stringify(historial));
        mostrarHistorial();
    });
}

// Función mínima para mostrar confirmación bonita
function mostrarConfirmacion(mensaje, onConfirm) {
    const modal = document.createElement("div");
    modal.style.cssText = `
        position: fixed; top:0; left:0; width:100%; height:100%;
        display:flex; justify-content:center; align-items:center;
        background: rgba(0,0,0,0.5); z-index:1000;
    `;
    modal.innerHTML = `
        <div style="background:#fff; padding:20px 30px; border-radius:12px; text-align:center; max-width:300px; font-family:Poppins;">
            <p style="margin-bottom:20px;">${mensaje}</p>
            <button id="cancelar" style="margin-right:10px; padding:8px 16px; border:none; border-radius:8px; background:#ccc; cursor:pointer;">Cancelar</button>
            <button id="confirmar" style="padding:8px 16px; border:none; border-radius:8px; background:#e74c3c; color:#fff; cursor:pointer;">Eliminar</button>
        </div>
    `;
    document.body.appendChild(modal);

    modal.querySelector("#cancelar").onclick = () => modal.remove();
    modal.querySelector("#confirmar").onclick = () => {
        onConfirm();
        modal.remove();
    };
}

/* ==================== GRAFICA ==================== */
let graficaActual = null;
function crearGrafica() {
    const ctx = document.getElementById("grafica");
    if (!ctx) return;
    if (graficaActual) graficaActual.destroy();

    const meses = {};
    historial.forEach(v => {
        let mes = v.fecha.split("/")[1];
        meses[mes] = (meses[mes] || 0) + v.total;
    });

    graficaActual = new Chart(ctx, {
        type: "bar",
        data: {
            labels: Object.keys(meses),
            datasets: [{
                label: "Ingresos por Mes",
                data: Object.values(meses),
                backgroundColor: "#3b82f6"
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } }
        }
    });
}

/* ==================== GENERAR PDF ==================== */
async function generarPDF() {
    const { jsPDF } = window.jspdf;

    const doc = new jsPDF({
        orientation: "p",
        unit: "mm",
        format: [80, 200]
    });

    let y = 10;

    // Logo
    try {
        let logo = await cargarImagenBase64("23.jpeg");
        doc.addImage(logo, "JPEG", 25, y, 30, 20);
        y += 25;
    } catch (e) {
        console.warn("No se pudo cargar el logo:", e);
    }

    // Encabezado
    doc.setFontSize(12);
    doc.text("YOLUVAMI", 40, y, { align: "center" });
    y += 5;
    doc.setFontSize(8);
    doc.text("Factura de Venta", 40, y, { align: "center" });
    y += 8;

    let numeroFactura = "FAC-" + Date.now();
    let v = historial[historial.length - 1];

    // Datos
    doc.setFontSize(8);
    doc.text(`Factura: ${numeroFactura}`, 5, y);
    y += 4;
    doc.text(`Fecha: ${v.fecha}`, 5, y);
    y += 4;
    doc.text(`Hora: ${v.hora}`, 5, y);
    y += 4;
    doc.text(`Vendedor: ${v.vendedor || "N/A"}`, 5, y);
    y += 6;

    doc.line(5, y, 75, y);
    y += 5;

    // Productos
    doc.text("Producto", 5, y);
    doc.text("Cant", 40, y);
    doc.text("Total", 60, y);
    y += 4;
    doc.line(5, y, 75, y);
    y += 5;

    v.productos.forEach(p => {
        let nombre = p.name.length > 18 ? p.name.substring(0, 18) + "…" : p.name;
        doc.text(nombre, 5, y);
        doc.text(String(p.cantidad), 40, y);
        doc.text(`C$${p.subtotal}`, 60, y);
        y += 5;
    });

    doc.line(5, y, 75, y);
    y += 6;

    // Total
    doc.setFontSize(10);
    doc.text(`TOTAL: C$${v.total}`, 5, y);
    y += 8;

    // Mensaje final
    doc.setFontSize(8);
    doc.text("Gracias por su compra", 40, y, { align: "center" });
    y += 4;
    doc.text("YOLUVAMI", 40, y, { align: "center" });

    doc.save(`Ticket_${numeroFactura}.pdf`);
}

/* ==================== CONVERTIR IMAGEN A BASE64 ==================== */
function cargarImagenBase64(url) {
    return new Promise((resolve, reject) => {
        let img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = function () {
            let canvas = document.createElement("canvas");
            canvas.width = this.width;
            canvas.height = this.height;
            let ctx = canvas.getContext("2d");
            ctx.drawImage(this, 0, 0);
            resolve(canvas.toDataURL("image/jpeg"));
        };
        img.onerror = reject;
        img.src = url;
    });
}

/* ==================== ENVIAR WHATSAPP ==================== */
function enviarWhatsApp() {
    let mensaje = "📊 Resumen YOLUVAMI\n\n";
    let total = 0;
    let vendedor = usuarioActual ? usuarioActual.user : "Desconocido";

    historial.forEach(v => {
        mensaje += `🧑 Vendedor: ${vendedor}\n`;
        mensaje += `📅 ${v.fecha} ${v.hora}\n`;
        v.productos.forEach(p => {
            mensaje += `🛍 ${p.name} x${p.cantidad} - C$${p.subtotal}\n`;
        });
        mensaje += `💰 Total venta: C$${v.total}\n\n`;
        total += v.total;
    });

    mensaje += `📈 TOTAL GENERAL: C$${total}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`);
}

/* ==================== CORTE DE CAJA ESTILIZADO ==================== */
function corteCaja() {
    if (historial.length === 0) {
        alerta("No hay ventas registradas", "#dc2626");
        return;
    }

    // Crear contenido del corte
    let vendedores = {};
    historial.forEach(v => {
        let nombre = v.vendedor || "Desconocido";
        if (!vendedores[nombre]) {
            vendedores[nombre] = { ventas: 0, total: 0 };
        }
        vendedores[nombre].ventas += 1;
        vendedores[nombre].total += v.total;
    });

    let totalGeneral = 0;
    let contenidoHTML = `<h2 style="text-align:center;color:#1e40af;font-family:Poppins;">📊 CORTE DE CAJA</h2><hr style="border-color:#3b82f6;">`;

    for (let v in vendedores) {
        contenidoHTML += `
        <div style="margin-bottom:10px;padding:5px;border-bottom:1px solid #e5e7eb;">
            <strong style="color:#2563eb;">🧑 ${v}</strong><br>
            Ventas: ${vendedores[v].ventas}<br>
            Total: <strong style="color:#16a34a;">C$${vendedores[v].total}</strong>
        </div>`;
        totalGeneral += vendedores[v].total;
    }

    contenidoHTML += `<hr style="border-color:#3b82f6;">
    <h3 style="text-align:right;color:#dc2626;font-family:Poppins;">💰 TOTAL GENERAL: C$${totalGeneral}</h3>
    <div style="text-align:center;margin-top:10px;"><button id="cerrarCorte" style="padding:6px 12px;background:#3b82f6;color:white;border:none;border-radius:6px;font-weight:600;cursor:pointer;">Cerrar</button></div>`;

    // Crear modal
    const modal = document.createElement("div");
    modal.id = "modalCorteCaja";
    modal.style.position = "fixed";
    modal.style.top = "0";
    modal.style.left = "0";
    modal.style.width = "100%";
    modal.style.height = "100%";
    modal.style.background = "rgba(0,0,0,0.6)";
    modal.style.display = "flex";
    modal.style.alignItems = "center";
    modal.style.justifyContent = "center";
    modal.style.zIndex = "9999";

    modal.innerHTML = `
        <div style="background:white;padding:20px 30px;border-radius:12px;max-width:400px;width:90%;box-shadow:0 10px 25px rgba(0,0,0,0.3);">
            ${contenidoHTML}
        </div>
    `;

    document.body.appendChild(modal);

    // Cerrar modal al presionar el botón
    document.getElementById("cerrarCorte").addEventListener("click", () => {
        modal.remove();
    });
}

mostrarDeudas();
