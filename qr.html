<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Productos</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#ffffff;
  color:#111;
}

/* HEADER */
.header{
  padding:25px 15px 15px;
  text-align:center;
  border-bottom:1px solid #eee;
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:26px;
  letter-spacing:2px;
}

.sub{
  font-size:12px;
  color:#777;
  margin-top:5px;
}

.line{
  width:40px;
  height:2px;
  background:#000;
  margin:10px auto 0;
}

/* BUSCADOR */
.search{
  padding:12px 15px;
}

.search input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:14px;
}

/* GRID */
.grid{
  padding:15px;
  display:grid;
  grid-template-columns:1fr; /* 📱 móvil */
  gap:15px;
}

/* TABLET */
@media(min-width:600px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}

/* PC */
@media(min-width:900px){
  .grid{
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  }
}

/* CARD */
.card{
  background:#fff;
  border-radius:14px;
  padding:15px;
  text-align:center;
  border:1px solid #eee;
  transition:.3s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

/* TEXTO */
.card h4{
  font-size:14px;
  font-weight:500;
}

.card small{
  display:block;
  color:#888;
  font-size:11px;
}

/* QR */
canvas{
  width:100% !important;
  max-width:160px;
  margin:12px auto;
  padding:6px;
  border-radius:10px;
  border:1px solid #eee;
}

/* BOTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#000;
  color:#fff;
  font-weight:500;
  font-size:14px;
}

/* ANIMACION */
.card{
  animation:fade .4s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">

  <div class="sub">QR de productos</div>
  <div class="line"></div>

<div class="search">

const contenedor = document.getElementById("listaQR");
const buscador = document.getElementById("buscador");

function mostrarProductos(lista){

    contenedor.innerHTML = "";

    lista.forEach(p => {

        const div = document.createElement("div");
        div.className = "card";

        const canvas = document.createElement("canvas");

const url = p.id;
        QRCode.toCanvas(canvas, url, {
            width: 160,
            margin: 2,
            errorCorrectionLevel: 'H'
        });

        const btn = document.createElement("button");
        btn.innerText = "Descargar QR";
        btn.onclick = () => {
            const link = document.createElement("a");
            link.download = `${p.id}.png`;
            link.href = canvas.toDataURL();
            link.click();
        };

        div.innerHTML = `
            <h4>${p.name}</h4>
            <small>${p.id}</small>
        `;

        div.appendChild(canvas);
        div.appendChild(btn);

        contenedor.appendChild(div);

    });

}

// BUSCADOR
buscador.addEventListener("input", e => {
    const texto = e.target.value.toLowerCase();

    const filtrados = productos.filter(p =>
        p.name.toLowerCase().includes(texto) ||
        p.id.toLowerCase().includes(texto)
    );

    mostrarProductos(filtrados);
});

// INICIAL
mostrarProductos(productos);

</script>

</body>
